<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AIOS — Voice</title>
<link rel="stylesheet" href="/theme.css">
<style>
  body {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 24px;
    user-select: none;
    -webkit-user-select: none;
  }

  .back { position: absolute; top: 20px; left: 20px; }

  h1 { font-family: var(--font-mono); font-size: 13px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-faint); text-transform: uppercase; position: absolute; top: 22px; }

  #talk-btn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 2px solid var(--border-strong);
    background: var(--bg-raised);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 24px rgba(231, 76, 60, 0.35); transform: scale(1.04); }
    50% { box-shadow: 0 0 48px rgba(231, 76, 60, 0.6); transform: scale(1.09); }
  }
  #talk-btn.recording {
    background: var(--danger);
    border-color: var(--danger-bright);
    animation: breathe 1.6s ease-in-out infinite;
  }
  #talk-btn.processing {
    background: #1f1f2e;
    border-color: #4a4ae0;
  }

  #status {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-faint);
    text-align: center;
    max-width: 320px;
    min-height: 40px;
  }

  #transcript, #reply {
    font-size: 14px;
    color: var(--text-dim);
    text-align: center;
    max-width: 400px;
    line-height: 1.5;
  }
  #reply { color: #ddd; }

  #error {
    color: var(--danger-bright);
    font-size: 13px;
    text-align: center;
    max-width: 340px;
  }

  #change-voice { color: var(--text-faint); font-size: 12px; text-decoration: underline; }
</style>
</head>
<body>
  <a class="back" href="/">← Hub</a>
  <h1>Push to talk</h1>
  <button id="talk-btn">Hold to talk</button>
  <div id="status">Hold the button and speak</div>
  <div id="transcript"></div>
  <div id="reply"></div>
  <div id="error"></div>
  <a id="change-voice" href="/voice-picker">Change voice</a>

  <script>
    const btn = document.getElementById('talk-btn');
    const statusEl = document.getElementById('status');
    const transcriptEl = document.getElementById('transcript');
    const replyEl = document.getElementById('reply');
    const errorEl = document.getElementById('error');

    let mediaRecorder, chunks = [], stream;
    const SESSION_KEY = 'aios-voice-session';

    function getSessionId() { return localStorage.getItem(SESSION_KEY); }
    function setSessionId(id) { if (id) localStorage.setItem(SESSION_KEY, id); }

    // iOS Safari's MediaRecorder can't produce webm — fall back to mp4.
    function pickMime() {
      for (const m of ['audio/webm', 'audio/mp4']) {
        if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
      }
      return ''; // let the browser pick its default
    }

    async function startRecording() {
      errorEl.textContent = '';
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        errorEl.textContent = 'Microphone access denied.';
        return;
      }
      chunks = [];
      const mime = pickMime();
      mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
      mediaRecorder.start();
      btn.classList.add('recording');
      btn.textContent = 'Listening…';
      statusEl.textContent = 'Release to send';
    }

    async function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
      btn.classList.remove('recording');
      btn.classList.add('processing');
      btn.textContent = 'Thinking…';
      statusEl.textContent = 'Transcribing and replying…';

      const stopped = new Promise((resolve) => { mediaRecorder.onstop = resolve; });
      mediaRecorder.stop();
      stream.getTracks().forEach((t) => t.stop());
      await stopped;

      const mime = mediaRecorder.mimeType || 'audio/webm';
      const ext = mime.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(chunks, { type: mime });
      const form = new FormData();
      form.append('audio', blob, 'audio.' + ext);
      const sid = getSessionId();
      if (sid) form.append('session_id', sid);

      try {
        const res = await fetch('/voice', { method: 'POST', body: form });
        if (!res.ok) {
          const detail = await res.text();
          throw new Error(detail || res.statusText);
        }
        setSessionId(res.headers.get('X-Session-Id'));
        transcriptEl.textContent = 'You: ' + decodeURIComponent(res.headers.get('X-Transcript') || '');
        replyEl.textContent = decodeURIComponent(res.headers.get('X-Reply-Text') || '');
        const audioBlob = await res.blob();
        const url = URL.createObjectURL(audioBlob);
        const player = new Audio(url);
        statusEl.textContent = 'Playing reply…';
        player.play();
        player.onended = () => { statusEl.textContent = 'Hold the button and speak'; };
      } catch (e) {
        errorEl.textContent = 'Error: ' + e.message;
        statusEl.textContent = 'Hold the button and speak';
      } finally {
        btn.classList.remove('processing');
        btn.textContent = 'Hold to talk';
      }
    }

    // Pointer events + capture: release anywhere (even after dragging off the
    // button) still ends the recording — mouse/touch each had hold-forever bugs.
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      btn.setPointerCapture(e.pointerId);
      startRecording();
    });
    btn.addEventListener('pointerup', (e) => { e.preventDefault(); stopRecording(); });
    btn.addEventListener('pointercancel', () => stopRecording());
  </script>
</body>
</html>
