<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOS — Voice Picker</title>
<link rel="stylesheet" href="/theme.css">
<style>
  header { display: block; }
  header .top { display: flex; align-items: center; gap: 10px; }
  header p { font-size: 12px; color: var(--text-faint); margin-top: 4px; }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 28px 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .voice-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
  }
  .voice-row.current { border-color: var(--accent); }

  .voice-name { flex: 1; font-size: 15px; font-weight: 500; }
  .voice-name .badge {
    display: inline-block;
    margin-left: 8px;
    font-size: 10px;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 1px 6px;
    text-transform: uppercase;
  }

  button.use-btn { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-bright); }
  button.use-btn:hover { background: #1c3d26; }

  #status { font-size: 13px; color: var(--text-dim); margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
  <header>
    <div class="top">
      <a class="back" href="/voice">← Voice</a>
      <h1>VOICE PICKER</h1>
    </div>
    <p>Preview each voice, then pick the one you want the agent to use. Takes effect immediately, no restart.</p>
  </header>
  <main id="voices">Loading…</main>
  <div id="status" style="max-width:560px;margin:0 auto;padding:0 20px;"></div>

  <script>
    const statusEl = document.getElementById('status');
    let currentVoiceId = null;

    async function load() {
      const [voicesRes, currentRes] = await Promise.all([
        fetch('/api/voice-picker/voices'),
        fetch('/api/voice-picker/current'),
      ]);
      const voices = await voicesRes.json();
      currentVoiceId = (await currentRes.json()).voice_id;

      const container = document.getElementById('voices');
      container.innerHTML = '';
      for (const [name, id] of Object.entries(voices)) {
        const row = document.createElement('div');
        row.className = 'card voice-row' + (id === currentVoiceId ? ' current' : '');
        row.dataset.voiceId = id;
        row.innerHTML = `
          <div class="voice-name">${name}${id === currentVoiceId ? '<span class="badge">Active</span>' : ''}</div>
          <button class="preview-btn">▶ Preview</button>
          <button class="use-btn">Use this</button>
        `;
        row.querySelector('.preview-btn').addEventListener('click', () => preview(id, row));
        row.querySelector('.use-btn').addEventListener('click', () => select(id, name));
        container.appendChild(row);
      }
    }

    async function preview(voiceId, row) {
      const btn = row.querySelector('.preview-btn');
      btn.disabled = true;
      btn.textContent = 'Loading…';
      try {
        const res = await fetch('/api/voice-picker/preview?voice_id=' + encodeURIComponent(voiceId));
        if (!res.ok) throw new Error(await res.text());
        const blob = await res.blob();
        new Audio(URL.createObjectURL(blob)).play();
      } catch (e) {
        statusEl.textContent = 'Preview failed: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '▶ Preview';
      }
    }

    async function select(voiceId, name) {
      statusEl.textContent = 'Setting ' + name + ' as the active voice…';
      const res = await fetch('/api/voice-picker/select', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ voice_id: voiceId }),
      });
      if (res.ok) {
        statusEl.textContent = name + ' is now the active voice. Try /voice to hear it live.';
        load();
      } else {
        statusEl.textContent = 'Failed to set voice.';
      }
    }

    load();
  </script>
</body>
</html>
