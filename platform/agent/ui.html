<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.04em; color: #fff; }
  header span { font-size: 12px; color: #555; }

  #session-id {
    margin-left: auto;
    font-size: 11px;
    color: #444;
    font-family: monospace;
    cursor: pointer;
  }

  #new-session {
    background: none;
    border: 1px solid #2a2a2a;
    color: #666;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  #new-session:hover { border-color: #444; color: #aaa; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .msg {
    padding: 10px 24px;
    line-height: 1.6;
    font-size: 14.5px;
    max-width: 100%;
  }

  .msg.user {
    color: #c8c8c8;
    border-left: 2px solid #2a2a2a;
    margin: 4px 0;
  }

  .msg.assistant {
    color: #e8e8e8;
    white-space: pre-wrap;
  }

  .msg.user::before { content: 'You  '; font-size: 11px; color: #444; display: block; margin-bottom: 3px; }
  .msg.assistant::before { content: 'AIOS'; font-size: 11px; color: #4a9eff; display: block; margin-bottom: 3px; font-weight: 600; }

  .msg.thinking { opacity: 0.4; font-style: italic; }

  #form {
    padding: 16px 20px;
    border-top: 1px solid #1a1a1a;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #e8e8e8;
    font-size: 14.5px;
    padding: 10px 14px;
    resize: none;
    height: 44px;
    min-height: 44px;
    max-height: 200px;
    outline: none;
    font-family: inherit;
    line-height: 1.5;
    overflow-y: hidden;
  }

  #input:focus { border-color: #3a3a3a; }

  #send {
    background: #1a6eff;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    padding: 0 18px;
    cursor: pointer;
    font-weight: 500;
    height: 44px;
    flex-shrink: 0;
  }
  #send:hover { background: #2a7eff; }
  #send:disabled { background: #1a2a3a; color: #446; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>AIOS</h1>
  <span>personal AI</span>
  <span id="session-id" title="Click to copy session ID"></span>
  <button id="new-session">New session</button>
</header>

<div id="messages"></div>

<form id="form">
  <textarea id="input" placeholder="Message…" rows="1"></textarea>
  <button type="submit" id="send">Send</button>
</form>

<script>
const $ = id => document.getElementById(id);
const msgs = $('messages');
const input = $('input');
const send = $('send');
const sessionLabel = $('session-id');

let sessionId = localStorage.getItem('aios_session_id') || null;
if (sessionId) sessionLabel.textContent = sessionId.slice(0,8) + '…';

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

async function send_msg() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '44px';
  send.disabled = true;

  addMsg('user', text);
  const thinking = addMsg('assistant thinking', 'Thinking…');

  try {
    const body = { message: text };
    if (sessionId) body.session_id = sessionId;

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    thinking.remove();

    if (data.session_id) {
      sessionId = data.session_id;
      localStorage.setItem('aios_session_id', sessionId);
      sessionLabel.textContent = sessionId.slice(0,8) + '…';
    }

    addMsg('assistant', data.reply || data.detail || 'Error');
  } catch (e) {
    thinking.remove();
    addMsg('assistant', 'Network error: ' + e.message);
  }

  send.disabled = false;
  input.focus();
}

$('form').addEventListener('submit', e => { e.preventDefault(); send_msg(); });

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send_msg(); }
});

input.addEventListener('input', () => {
  input.style.height = '44px';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  input.style.overflowY = input.scrollHeight > 200 ? 'auto' : 'hidden';
});

$('new-session').addEventListener('click', () => {
  sessionId = null;
  localStorage.removeItem('aios_session_id');
  sessionLabel.textContent = '';
  msgs.innerHTML = '';
});

sessionLabel.addEventListener('click', () => {
  if (sessionId) navigator.clipboard.writeText(sessionId);
});
</script>
</body>
</html>
