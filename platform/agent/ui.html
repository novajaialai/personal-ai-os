<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOS — Chat</title>
<link rel="stylesheet" href="/theme.css">
<style>
  body {
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header { flex-shrink: 0; }

  #session-id {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-faint);
    font-family: monospace;
    cursor: pointer;
  }

  #new-session { padding: 4px 10px; font-size: 12px; border-radius: 6px; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  #empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-faint);
    font-size: 14px;
    line-height: 1.8;
    padding: 0 24px;
  }
  #empty-state strong { color: var(--text-dim); font-weight: 600; display: block; font-size: 15px; }

  .msg {
    padding: 10px 24px;
    line-height: 1.6;
    font-size: 14.5px;
    max-width: 100%;
  }

  .msg.user {
    color: #c8c8c8;
    border-left: 2px solid var(--border-strong);
    margin: 4px 0;
    white-space: pre-wrap;
  }

  .msg.assistant { color: var(--text); overflow-wrap: break-word; }
  .msg.assistant.streaming { white-space: pre-wrap; }

  .msg.user::before { content: 'You  '; font-size: 11px; color: var(--text-faint); display: block; margin-bottom: 3px; }
  .msg.assistant::before { content: 'AIOS'; font-size: 11px; color: var(--accent-bright); display: block; margin-bottom: 3px; font-weight: 600; }

  .msg.thinking { opacity: 0.4; font-style: italic; }
  .msg.working { opacity: 0.45; font-size: 13px; font-style: italic; white-space: pre-wrap; }
  .msg.working::before { content: 'AIOS · working'; font-size: 11px; color: var(--text-faint); display: block; margin-bottom: 3px; font-style: normal; }

  /* rendered markdown inside assistant messages */
  .msg.assistant p { margin: 0 0 8px; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant ul, .msg.assistant ol { margin: 0 0 8px 22px; }
  .msg.assistant li { margin: 2px 0; }
  .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 { font-size: 15px; color: #fff; margin: 12px 0 6px; }
  .msg.assistant code {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }
  .msg.assistant pre {
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin: 8px 0;
    overflow-x: auto;
  }
  .msg.assistant pre code { background: none; border: none; padding: 0; }
  .msg.assistant a { color: var(--accent-bright); text-decoration: underline; }
  .msg.assistant strong { color: #fff; }

  #form {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    color: var(--text);
    font-size: 14.5px;
    padding: 10px 14px;
    resize: none;
    height: 44px;
    min-height: 44px;
    max-height: 200px;
    outline: none;
    font-family: inherit;
    line-height: 1.5;
    overflow-y: hidden;
  }
  #input:focus { border-color: var(--border-hover); }

  #send { padding: 0 18px; font-size: 14px; height: 44px; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <a class="back" href="/">← Hub</a>
  <h1>AIOS</h1>
  <span class="tag">second brain</span>
  <span id="session-id" title="Click to copy session ID"></span>
  <button id="new-session">New session</button>
</header>

<div id="messages">
  <div id="empty-state">
    <strong>What's on your mind?</strong>
    Ask anything, capture a thought, or search your vault —<br>
    try “what do my notes say about …” or “log this: …”
  </div>
</div>

<form id="form">
  <textarea id="input" placeholder="Message…" rows="1"></textarea>
  <button type="submit" id="send" class="primary">Send</button>
</form>

<script>
const $ = id => document.getElementById(id);
const msgs = $('messages');
const input = $('input');
const send = $('send');
const sessionLabel = $('session-id');

let sessionId = localStorage.getItem('aios_session_id') || null;

function setSession(id) {
  sessionId = id;
  if (id) {
    localStorage.setItem('aios_session_id', id);
    sessionLabel.textContent = id.slice(0, 8) + '…';
  } else {
    localStorage.removeItem('aios_session_id');
    sessionLabel.textContent = '';
  }
}
if (sessionId) sessionLabel.textContent = sessionId.slice(0, 8) + '…';

/* Minimal markdown renderer — no deps. Escapes first, then formats:
   fenced code, headers, lists, bold/italic/inline code/links, paragraphs. */
function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function inlineMd(s) {
  return s
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|\W)\*([^*\s][^*]*)\*/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function renderMd(text) {
  const out = [];
  const lines = text.split('\n');
  let i = 0, list = null, para = [];
  const closeList = () => { if (list) { out.push(`</${list}>`); list = null; } };
  const closePara = () => { if (para.length) { out.push('<p>' + inlineMd(para.join('<br>')) + '</p>'); para = []; } };
  while (i < lines.length) {
    const raw = lines[i];
    if (raw.startsWith('```')) {
      closePara(); closeList();
      const code = [];
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) code.push(lines[i++]);
      i++; // skip closing fence
      out.push('<pre><code>' + esc(code.join('\n')) + '</code></pre>');
      continue;
    }
    const line = esc(raw);
    const h = line.match(/^(#{1,3})\s+(.*)/);
    const ul = line.match(/^\s*[-*]\s+(.*)/);
    const ol = line.match(/^\s*\d+[.)]\s+(.*)/);
    if (h) { closePara(); closeList(); out.push(`<h${h[1].length}>` + inlineMd(h[2]) + `</h${h[1].length}>`); }
    else if (ul) { closePara(); if (list !== 'ul') { closeList(); out.push('<ul>'); list = 'ul'; } out.push('<li>' + inlineMd(ul[1]) + '</li>'); }
    else if (ol) { closePara(); if (list !== 'ol') { closeList(); out.push('<ol>'); list = 'ol'; } out.push('<li>' + inlineMd(ol[1]) + '</li>'); }
    else if (line.trim() === '') { closePara(); closeList(); }
    else { closeList(); para.push(inlineMd(line)); }
    i++;
  }
  closePara(); closeList();
  return out.join('\n');
}

function hideEmptyState() {
  const e = $('empty-state');
  if (e) e.remove();
}

function addMsg(role, text) {
  hideEmptyState();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role.includes('assistant') && !role.includes('thinking')) div.innerHTML = renderMd(text);
  else div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

/* Rehydrate the visible conversation for a persisted session. */
async function loadHistory() {
  if (!sessionId) return;
  try {
    const res = await fetch('/sessions/' + sessionId);
    if (!res.ok) { setSession(null); return; }
    const data = await res.json();
    for (const m of data.messages) addMsg(m.role, m.content);
  } catch (e) { /* offline — leave empty state */ }
}

async function send_msg() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = '44px';
  send.disabled = true;

  addMsg('user', text);
  let current = addMsg('assistant streaming', '');
  current.textContent = '…';
  let started = false;

  const finishCurrent = () => {
    current.classList.remove('streaming');
    current.innerHTML = renderMd(current.textContent);
  };

  try {
    const body = { message: text };
    if (sessionId) body.session_id = sessionId;

    const res = await fetch('/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(await res.text() || res.statusText);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) !== -1) {
        const frame = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        if (!frame.startsWith('data: ')) continue;
        const ev = JSON.parse(frame.slice(6));
        if (ev.type === 'session') setSession(ev.session_id);
        else if (ev.type === 'text') {
          if (!started) { current.textContent = ''; started = true; }
          current.textContent += ev.text;
          msgs.scrollTop = msgs.scrollHeight;
        } else if (ev.type === 'flush') {
          // text so far was pre-tool narration — dim it, start a fresh bubble
          current.classList.remove('streaming');
          if (current.textContent.trim()) current.className = 'msg working';
          else current.remove();
          current = addMsg('assistant streaming', '');
          started = false;
        } else if (ev.type === 'error') {
          throw new Error(ev.detail);
        } else if (ev.type === 'done') {
          finishCurrent();
        }
      }
    }
    if (!started && !current.textContent) current.textContent = '(no reply)';
  } catch (e) {
    current.classList.remove('streaming');
    current.textContent = 'Error: ' + e.message;
  }

  send.disabled = false;
  input.focus();
}

$('form').addEventListener('submit', e => { e.preventDefault(); send_msg(); });

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send_msg(); }
});

input.addEventListener('input', () => {
  input.style.height = '44px';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  input.style.overflowY = input.scrollHeight > 200 ? 'auto' : 'hidden';
});

$('new-session').addEventListener('click', () => {
  setSession(null);
  location.reload();
});

sessionLabel.addEventListener('click', () => {
  if (sessionId) navigator.clipboard.writeText(sessionId);
});

loadHistory();
</script>
</body>
</html>
