<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOS — Daily Digest</title>
<link rel="stylesheet" href="/theme.css">
<style>
  header { position: sticky; top: 0; }

  #status {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  #date {
    font-size: 12px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 18px;
  }

  #content h1 {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin: 0 0 16px;
  }

  #content h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    margin: 24px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #content p {
    font-size: 15px;
    line-height: 1.65;
    color: var(--text-body);
    margin-bottom: 6px;
  }

  #content strong { color: #fff; }

  #empty {
    color: var(--text-faint);
    font-size: 14px;
  }
</style>
</head>
<body>
  <header>
    <a class="back" href="/">← Hub</a>
    <h1>DAILY DIGEST</h1>
    <span class="tag">AIOS second brain</span>
    <div id="status"><span class="dot up" id="dot"></span><span id="status-text">live</span></div>
  </header>
  <main>
    <div id="date">—</div>
    <div id="content"><p id="empty">Loading…</p></div>
  </main>

  <script>
    const POLL_MS = 15000;

    async function refresh() {
      const dot = document.getElementById('dot');
      const statusText = document.getElementById('status-text');
      try {
        const res = await fetch('/api/digest/latest', { cache: 'no-store' });
        const data = await res.json();
        document.getElementById('date').textContent = data.date || 'no digest yet';
        document.getElementById('content').innerHTML = data.html || '<p id="empty">Nothing here yet.</p>';
        dot.className = 'dot up';
        statusText.textContent = 'live · updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        dot.className = 'dot down';
        statusText.textContent = 'connection lost, retrying…';
      }
    }

    refresh();
    setInterval(refresh, POLL_MS);
  </script>
</body>
</html>
