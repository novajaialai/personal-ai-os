# The GENERIC platform stack — identical on every deployment.
# Per-tenant values come from the injected .env (see templates/.env.example).
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - ./hub:/srv/hub:ro
      - /srv/aios/vault/Business/aeo-reports:/srv/aeo:ro
    # Internal only — tailscale serve handles TLS + external access
    ports:
      - "127.0.0.1:8080:80"

  agent:
    build: ./agent
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ${VAULT_PATH}:/vault
      - agent_state:/state
    depends_on: [db, nango]

  intake:
    build: ./intake
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ${VAULT_PATH}:/vault

  nango:
    image: nangohq/nango-server:latest
    restart: unless-stopped
    env_file: ../.env
    depends_on: [db]

  nextcloud:
    image: nextcloud:stable
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - nextcloud_data:/var/www/html
      - ${VAULT_PATH}:/srv/aios/vault   # exposed for External Storage
    depends_on: [db]

  db:
    image: postgres:16
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - db_data:/var/lib/postgresql/data

  # ---- Business OS layer: CRM / BI / workflow spine ----
  # Each exposed on its own Tailscale-served HTTPS port (see docs/tailscale-serve-ports.md)
  # rather than a Caddy subpath — these apps assume they own their domain root and don't
  # support being reverse-proxied under a prefix cleanly (see the Nextcloud /files lesson
  # in HANDOFF.md 2026-07-01).
  # CRM: Twenty (github.com/twentyhq/twenty) — needs its own Postgres (pgvector + pg_graphql,
  # NOT the plain postgres:16 image used elsewhere in this stack — self-hosters who reuse a
  # vanilla Postgres hit "extension vector is unavailable") and its own Redis.
  twenty-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${TWENTY_PG_PASSWORD:?set TWENTY_PG_PASSWORD}
    volumes:
      - twenty_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  twenty-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  twenty-server:
    image: twentycrm/twenty:latest
    restart: unless-stopped
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://postgres:${TWENTY_PG_PASSWORD}@twenty-db:5432/default
      SERVER_URL: ${TWENTY_SERVER_URL}
      REDIS_URL: redis://twenty-redis:6379
      STORAGE_TYPE: local
      ENCRYPTION_KEY: ${TWENTY_ENCRYPTION_KEY:?set TWENTY_ENCRYPTION_KEY}
    volumes:
      - twenty_server_data:/app/packages/twenty-server/.local-storage
    ports:
      - "127.0.0.1:8081:3000"
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 5s
      retries: 20

  twenty-worker:
    image: twentycrm/twenty:latest
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://postgres:${TWENTY_PG_PASSWORD}@twenty-db:5432/default
      SERVER_URL: ${TWENTY_SERVER_URL}
      REDIS_URL: redis://twenty-redis:6379
      STORAGE_TYPE: local
      ENCRYPTION_KEY: ${TWENTY_ENCRYPTION_KEY}
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
    volumes:
      - twenty_server_data:/app/packages/twenty-server/.local-storage
    depends_on:
      twenty-db:
        condition: service_healthy
      twenty-server:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: db
      MB_SITE_URL: ${METABASE_SITE_URL}
    ports:
      - "127.0.0.1:8082:3000"
    depends_on: [db]

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOSTNAME}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: https://${N8N_HOSTNAME}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?set N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: ${TZ:-America/Denver}
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:8083:5678"
    depends_on: [db]

volumes:
  caddy_data:
  agent_state:
  nextcloud_data:
  db_data:
  twenty_db_data:
  twenty_server_data:
  n8n_data:
