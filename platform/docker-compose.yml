# The GENERIC platform stack — identical on every deployment.
# Per-tenant values come from the injected .env (see templates/.env.example).
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/aios/caddy/certs:/certs:ro
      - caddy_data:/data
    # Bound to the tailnet interface only — never published to 0.0.0.0
    ports:
      - "${TAILSCALE_IP}:443:443"

  agent:
    build: ./agent
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ${VAULT_PATH}:/vault
      - agent_state:/state
    depends_on: [db, nango]

  intake:
    build: ./intake
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - ${VAULT_PATH}:/vault

  nango:
    image: nangohq/nango-server:latest
    restart: unless-stopped
    env_file: ../.env
    depends_on: [db]

  nextcloud:
    image: nextcloud:stable
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - nextcloud_data:/var/www/html
      - ${VAULT_PATH}:/srv/aios/vault   # exposed for External Storage
    depends_on: [db]

  db:
    image: postgres:16
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  caddy_data:
  agent_state:
  nextcloud_data:
  db_data:
