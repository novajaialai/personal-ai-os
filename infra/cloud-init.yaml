#cloud-config
# First-boot hardening + base runtime. The platform itself runs in Docker.
package_update: true
package_upgrade: true

packages:
  - ufw
  - age
  - git
  - curl

users:
  - name: aios
    groups: [docker, sudo]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - "${SSH_PUBLIC_KEY}"

runcmd:
  # Docker: use official repo for docker-compose-plugin support
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker
  # Tailscale: private mesh access, nothing exposed publicly
  # Host firewall: default deny inbound (Tailscale carries real traffic)
  - sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl reload ssh
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22 comment 'admin SSH fallback (key-only auth)'
  - ufw --force enable
  - echo 'Personal AI OS base ready. Run scripts/bootstrap.sh next.'
